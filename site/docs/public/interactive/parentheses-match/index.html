<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>括号匹配</title>
  <style>
    :root {
      --bg: #0a1220;
      --panel: rgba(13, 24, 42, 0.9);
      --panel-strong: rgba(18, 31, 53, 0.96);
      --line: rgba(157, 182, 255, 0.18);
      --text: #edf3ff;
      --muted: #9fb0d4;
      --accent: #f4d27a;
      --blue: #84b8ff;
      --green: #82dfb0;
      --rose: #ffb3a7;
      --violet: #b9b3ff;
      --shadow: 0 28px 60px rgba(1, 8, 22, 0.45);
      --radius: 24px;
      --mono: "SFMono-Regular", "JetBrains Mono", "Menlo", "Consolas", monospace;
      --sans: "Avenir Next", "PingFang SC", "Noto Sans SC", "Helvetica Neue", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 10% 12%, rgba(132, 184, 255, 0.18), transparent 28%),
        radial-gradient(circle at 88% 20%, rgba(244, 210, 122, 0.12), transparent 24%),
        radial-gradient(circle at 82% 86%, rgba(130, 223, 176, 0.10), transparent 24%),
        linear-gradient(180deg, #060c16 0%, #0a1220 55%, #0d1624 100%);
      color: var(--text);
      font-family: var(--sans);
    }

    body {
      padding: 16px;
    }

    h1,
    h2,
    h3,
    p,
    button,
    input,
    label,
    select,
    span,
    div {
      letter-spacing: 0;
      font-kerning: normal;
    }

    .app {
      max-width: 1420px;
      margin: 0 auto;
      padding: 18px;
      border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: linear-gradient(180deg, rgba(9, 17, 29, 0.95), rgba(10, 19, 31, 0.89));
      box-shadow: var(--shadow);
    }

    .hero,
    .controls,
    .status-strip,
    .panel {
      border-radius: var(--radius);
      background: var(--panel);
      border: 1px solid var(--line);
    }

    .hero {
      margin-bottom: 14px;
      padding: 20px 22px;
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -60px;
      bottom: -90px;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(185, 179, 255, 0.20), transparent 66%);
      pointer-events: none;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 34px;
      line-height: 1.06;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      margin-bottom: 14px;
      padding: 16px 18px;
    }

    .field-row,
    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .field {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .field label {
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    input,
    select,
    button {
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: transform 120ms ease, background 120ms ease, border-color 120ms ease, box-shadow 120ms ease;
    }

    input,
    select {
      padding: 11px 12px;
      font-family: var(--mono);
    }

    input:focus,
    select:focus {
      border-color: rgba(244, 210, 122, 0.42);
      box-shadow: 0 0 0 3px rgba(244, 210, 122, 0.18);
    }

    #expr-input {
      width: min(520px, 62vw);
    }

    button {
      appearance: none;
      padding: 11px 14px;
      cursor: pointer;
      line-height: 1;
    }

    button:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.10);
      border-color: rgba(255, 255, 255, 0.18);
    }

    button.primary {
      background: linear-gradient(180deg, rgba(244, 210, 122, 0.24), rgba(183, 128, 39, 0.18));
      border-color: rgba(244, 210, 122, 0.34);
      color: #fff2cb;
    }

    button.secondary {
      background: linear-gradient(180deg, rgba(132, 184, 255, 0.20), rgba(88, 126, 184, 0.16));
      border-color: rgba(132, 184, 255, 0.30);
      color: #e6f0ff;
    }

    button.danger {
      background: linear-gradient(180deg, rgba(255, 179, 167, 0.18), rgba(160, 82, 74, 0.16));
      border-color: rgba(255, 179, 167, 0.28);
      color: #ffe5e0;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .status-strip {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
      padding: 12px;
    }

    .status-card {
      padding: 14px;
      border-radius: 18px;
      background: var(--panel-strong);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .status-label {
      margin-bottom: 8px;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .status-value {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 4px;
      min-height: 34px;
    }

    .status-note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) 360px;
      gap: 14px;
    }

    .panel {
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 16px 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent);
    }

    .panel-head h2 {
      margin: 0;
      font-size: 19px;
      line-height: 1.1;
    }

    .panel-note {
      color: var(--muted);
      font-size: 13px;
    }

    .panel-body {
      padding: 16px;
    }

    .expr-board {
      min-height: 420px;
      padding: 22px;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background:
        radial-gradient(circle at 16% 18%, rgba(132, 184, 255, 0.08), transparent 20%),
        radial-gradient(circle at 84% 82%, rgba(130, 223, 176, 0.08), transparent 20%),
        linear-gradient(180deg, rgba(17, 30, 52, 0.98), rgba(13, 23, 40, 0.98));
    }

    .expr-caption {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 18px;
      margin-bottom: 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .expr-caption strong {
      color: var(--text);
    }

    .char-track {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(74px, 1fr));
      gap: 12px;
    }

    .char-card {
      min-height: 126px;
      padding: 12px 10px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: linear-gradient(180deg, rgba(26, 42, 68, 0.92), rgba(16, 27, 46, 0.92));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: border-color 160ms ease, transform 160ms ease, box-shadow 160ms ease;
    }

    .char-card.current {
      border-color: rgba(244, 210, 122, 0.34);
      box-shadow: 0 0 0 1px rgba(244, 210, 122, 0.22), 0 14px 24px rgba(4, 10, 24, 0.28);
      transform: translateY(-2px);
    }

    .char-card.done {
      border-color: rgba(130, 223, 176, 0.28);
    }

    .char-card.error {
      border-color: rgba(255, 179, 167, 0.34);
      box-shadow: 0 0 0 1px rgba(255, 179, 167, 0.22);
    }

    .char-index {
      color: var(--muted);
      font-size: 12px;
      font-family: var(--mono);
    }

    .char-value {
      font-size: 34px;
      font-weight: 700;
      font-family: var(--mono);
      min-height: 38px;
    }

    .char-role {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      line-height: 1.35;
      min-height: 32px;
    }

    .message-bar {
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .stack-shell {
      min-height: 420px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .stack-area {
      flex: 1;
      border-radius: 22px;
      border: 1px solid rgba(132, 184, 255, 0.12);
      background: rgba(8, 17, 31, 0.52);
      padding: 18px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 12px;
      min-height: 300px;
    }

    .stack-item {
      padding: 14px 16px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(78, 120, 189, 0.98), rgba(49, 80, 135, 0.96));
      border: 1px solid rgba(132, 184, 255, 0.30);
      font-family: var(--mono);
      font-size: 26px;
      font-weight: 700;
      text-align: center;
    }

    .stack-top {
      box-shadow: 0 0 0 1px rgba(244, 210, 122, 0.25), 0 12px 20px rgba(4, 10, 24, 0.28);
    }

    .stack-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
      color: rgba(159, 176, 212, 0.66);
      font-size: 15px;
      text-align: center;
      line-height: 1.5;
      border-radius: 18px;
      border: 1px dashed rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.02);
    }

    .status-ok {
      color: var(--green);
    }

    .status-warn {
      color: var(--accent);
    }

    .status-bad {
      color: var(--rose);
    }

    @media (max-width: 1180px) {
      .controls {
        grid-template-columns: 1fr;
      }

      .status-strip {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 860px) {
      body {
        padding: 10px;
      }

      .app {
        padding: 12px;
      }

      h1 {
        font-size: 28px;
      }

      .status-strip {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      #expr-input {
        width: min(100%, 360px);
      }

      .char-track {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="hero">
      <h1>括号匹配</h1>
    </section>

    <section class="controls">
      <div class="field-row">
        <div class="field">
          <label for="example-select">示例</label>
          <select id="example-select">
            <option value="([]{})" selected>正确：([]{})</option>
            <option value="([{}])">正确：([{}])</option>
            <option value="([)]">错误：([)]</option>
            <option value="(()">错误：(()</option>
            <option value="())">错误：())</option>
            <option value="{[()]}a+b">含普通字符：{[()]}a+b</option>
          </select>
        </div>
        <div class="field">
          <label for="expr-input">表达式</label>
          <input id="expr-input" type="text" value="([]{})">
        </div>
      </div>
      <div class="button-row">
        <button id="build-btn" class="primary">生成步骤</button>
        <button id="prev-btn">上一步</button>
        <button id="next-btn" class="secondary">下一步</button>
        <button id="play-btn">自动播放</button>
        <button id="reset-btn" class="danger">重置</button>
      </div>
    </section>

    <section class="status-strip">
      <div class="status-card">
        <div class="status-label">步数</div>
        <div id="step-value" class="status-value">0 / 0</div>
        <div class="status-note">当前停在第几步</div>
      </div>
      <div class="status-card">
        <div class="status-label">当前字符</div>
        <div id="char-value" class="status-value">-</div>
        <div class="status-note">正在处理的位置</div>
      </div>
      <div class="status-card">
        <div class="status-label">动作</div>
        <div id="action-value" class="status-value">待开始</div>
        <div class="status-note">push / pop / fail / skip</div>
      </div>
      <div class="status-card">
        <div class="status-label">栈顶</div>
        <div id="top-value" class="status-value">空</div>
        <div class="status-note">当前最上面的括号</div>
      </div>
      <div class="status-card">
        <div class="status-label">当前栈大小</div>
        <div id="size-value" class="status-value">0</div>
        <div class="status-note">还没配完的左括号数</div>
      </div>
      <div class="status-card">
        <div class="status-label">结果</div>
        <div id="result-value" class="status-value">未判定</div>
        <div id="result-note" class="status-note">扫描结束后才最终确定</div>
      </div>
    </section>

    <section class="layout">
      <div class="panel">
        <div class="panel-head">
          <h2>从左到右扫描</h2>
          <div class="panel-note">黄色是当前字符，绿色表示已顺利处理，红色表示在这里失败</div>
        </div>
        <div class="panel-body">
          <div class="expr-board">
            <div class="expr-caption">
              <span><strong>规则：</strong> 左括号入栈，右括号必须和栈顶配对</span>
              <span><strong>提醒：</strong> 普通字符会被跳过，不影响括号匹配</span>
            </div>
            <div id="char-track" class="char-track"></div>
            <div id="message-bar" class="message-bar"></div>
          </div>
        </div>
      </div>

      <aside class="panel">
        <div class="panel-head">
          <h2>栈</h2>
          <div class="panel-note">最上面那个，就是下一次要比较的栈顶</div>
        </div>
        <div class="panel-body">
          <div class="stack-shell">
            <div id="stack-area" class="stack-area"></div>
          </div>
        </div>
      </aside>
    </section>
  </div>

  <script>
    const pairs = {
      ")": "(",
      "]": "[",
      "}": "{"
    };

    const openings = new Set(["(", "[", "{"]);
    const closings = new Set([")", "]", "}"]);

    const exampleSelect = document.getElementById("example-select");
    const exprInput = document.getElementById("expr-input");
    const buildBtn = document.getElementById("build-btn");
    const prevBtn = document.getElementById("prev-btn");
    const nextBtn = document.getElementById("next-btn");
    const playBtn = document.getElementById("play-btn");
    const resetBtn = document.getElementById("reset-btn");

    const stepValue = document.getElementById("step-value");
    const charValue = document.getElementById("char-value");
    const actionValue = document.getElementById("action-value");
    const topValue = document.getElementById("top-value");
    const sizeValue = document.getElementById("size-value");
    const resultValue = document.getElementById("result-value");
    const resultNote = document.getElementById("result-note");

    const charTrack = document.getElementById("char-track");
    const stackArea = document.getElementById("stack-area");
    const messageBar = document.getElementById("message-bar");

    let state = null;
    let currentStep = 0;
    let playing = false;

    function cloneStack(stack) {
      return stack.slice();
    }

    function buildSteps(expr) {
      const steps = [];
      const stack = [];
      let finalStatus = "pending";
      let finalMessage = "还没有开始扫描。";

      steps.push({
        index: -1,
        char: "",
        action: "待开始",
        stack: cloneStack(stack),
        status: "pending",
        message: "从左到右扫描字符串。遇到左括号就入栈，遇到右括号就和栈顶配对。"
      });

      for (let i = 0; i < expr.length; i += 1) {
        const ch = expr[i];

        if (!openings.has(ch) && !closings.has(ch)) {
          steps.push({
            index: i,
            char: ch,
            action: "skip",
            stack: cloneStack(stack),
            status: "pending",
            message: "字符 `" + ch + "` 不是括号，直接跳过。"
          });
          continue;
        }

        if (openings.has(ch)) {
          stack.push(ch);
          steps.push({
            index: i,
            char: ch,
            action: "push",
            stack: cloneStack(stack),
            status: "pending",
            message: "遇到左括号 `" + ch + "`，入栈。现在它成了新的栈顶。"
          });
          continue;
        }

        if (!stack.length) {
          finalStatus = "fail";
          finalMessage = "处理到 `" + ch + "` 时失败：栈已经空了，却还遇到右括号。";
          steps.push({
            index: i,
            char: ch,
            action: "fail",
            stack: cloneStack(stack),
            status: "fail",
            message: finalMessage
          });
          return { expr, steps, finalStatus, finalMessage };
        }

        const top = stack[stack.length - 1];
        if (top !== pairs[ch]) {
          finalStatus = "fail";
          finalMessage = "处理到 `" + ch + "` 时失败：它需要匹配 `" + pairs[ch] + "`，但栈顶是 `" + top + "`。";
          steps.push({
            index: i,
            char: ch,
            action: "fail",
            stack: cloneStack(stack),
            status: "fail",
            message: finalMessage
          });
          return { expr, steps, finalStatus, finalMessage };
        }

        stack.pop();
        steps.push({
          index: i,
          char: ch,
          action: "pop",
          stack: cloneStack(stack),
          status: "pending",
          message: "遇到右括号 `" + ch + "`，它和栈顶 `" + pairs[ch] + "` 成功配对，所以把栈顶弹出。"
        });
      }

      if (stack.length) {
        finalStatus = "fail";
        finalMessage = "扫描结束后仍有左括号留在栈里，说明还没配完。";
        steps.push({
          index: expr.length,
          char: "",
          action: "finish",
          stack: cloneStack(stack),
          status: "fail",
          message: finalMessage
        });
        return { expr, steps, finalStatus, finalMessage };
      }

      finalStatus = "success";
      finalMessage = "扫描结束，栈也为空，所以括号匹配成功。";
      steps.push({
        index: expr.length,
        char: "",
        action: "finish",
        stack: cloneStack(stack),
        status: "success",
        message: finalMessage
      });
      return { expr, steps, finalStatus, finalMessage };
    }

    function resetState(expr) {
      state = buildSteps(expr);
      currentStep = 0;
      playing = false;
      render();
    }

    function currentSnapshot() {
      return state.steps[currentStep];
    }

    function currentResultText(snapshot) {
      if (snapshot.status === "success") {
        return { label: "匹配成功", note: state.finalMessage, cls: "status-ok" };
      }
      if (snapshot.status === "fail") {
        return { label: "匹配失败", note: state.finalMessage, cls: "status-bad" };
      }
      return { label: "未判定", note: "扫描结束后才最终确定", cls: "status-warn" };
    }

    function renderChars(snapshot) {
      charTrack.innerHTML = "";

      if (!state.expr.length) {
        const empty = document.createElement("div");
        empty.className = "message-bar";
        empty.textContent = "表达式为空。先输入一些括号，再点击“生成步骤”。";
        charTrack.appendChild(empty);
        return;
      }

      for (let i = 0; i < state.expr.length; i += 1) {
        const ch = state.expr[i];
        const card = document.createElement("div");
        card.className = "char-card";

        if (snapshot.index === i) {
          card.classList.add(snapshot.status === "fail" ? "error" : "current");
        } else if (i < snapshot.index || (snapshot.index === state.expr.length && currentStep > 0)) {
          card.classList.add("done");
        }

        let role = "普通字符";
        if (openings.has(ch)) {
          role = "左括号";
        } else if (closings.has(ch)) {
          role = "右括号";
        }

        card.innerHTML = `
          <div class="char-index">index ${i}</div>
          <div class="char-value">${ch}</div>
          <div class="char-role">${role}</div>
        `;
        charTrack.appendChild(card);
      }
    }

    function renderStack(snapshot) {
      stackArea.innerHTML = "";
      const stack = snapshot.stack;

      if (!stack.length) {
        const empty = document.createElement("div");
        empty.className = "stack-empty";
        empty.innerHTML = "栈当前为空。<br>如果现在遇到右括号，就会立刻失败。";
        stackArea.appendChild(empty);
        return;
      }

      for (let i = stack.length - 1; i >= 0; i -= 1) {
        const item = document.createElement("div");
        item.className = "stack-item";
        if (i === stack.length - 1) {
          item.classList.add("stack-top");
        }
        item.textContent = stack[i];
        stackArea.appendChild(item);
      }
    }

    function renderStatus(snapshot) {
      stepValue.textContent = currentStep + " / " + (state.steps.length - 1);
      charValue.textContent = snapshot.char || "-";
      actionValue.textContent = snapshot.action;
      topValue.textContent = snapshot.stack.length ? snapshot.stack[snapshot.stack.length - 1] : "空";
      sizeValue.textContent = String(snapshot.stack.length);

      const result = currentResultText(snapshot);
      resultValue.className = "status-value " + result.cls;
      resultValue.textContent = result.label;
      resultNote.textContent = result.note;

      messageBar.textContent = snapshot.message;
    }

    function renderButtons() {
      prevBtn.disabled = currentStep === 0 || playing;
      nextBtn.disabled = currentStep >= state.steps.length - 1 || playing;
      buildBtn.disabled = playing;
      resetBtn.disabled = playing;
      exampleSelect.disabled = playing;
      exprInput.disabled = playing;
      playBtn.textContent = playing ? "播放中..." : "自动播放";
      playBtn.disabled = currentStep >= state.steps.length - 1;
    }

    function render() {
      const snapshot = currentSnapshot();
      renderChars(snapshot);
      renderStack(snapshot);
      renderStatus(snapshot);
      renderButtons();
    }

    function nextStep() {
      if (currentStep < state.steps.length - 1) {
        currentStep += 1;
        render();
      }
    }

    function prevStep() {
      if (currentStep > 0) {
        currentStep -= 1;
        render();
      }
    }

    async function playSteps() {
      if (playing || currentStep >= state.steps.length - 1) {
        return;
      }
      playing = true;
      render();

      while (playing && currentStep < state.steps.length - 1) {
        await new Promise((resolve) => window.setTimeout(resolve, 850));
        currentStep += 1;
        render();
      }

      playing = false;
      render();
    }

    buildBtn.addEventListener("click", () => {
      resetState(exprInput.value);
    });

    prevBtn.addEventListener("click", prevStep);
    nextBtn.addEventListener("click", nextStep);
    playBtn.addEventListener("click", playSteps);
    resetBtn.addEventListener("click", () => {
      playing = false;
      currentStep = 0;
      render();
    });

    exampleSelect.addEventListener("change", () => {
      exprInput.value = exampleSelect.value;
      resetState(exprInput.value);
    });

    exprInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        resetState(exprInput.value);
      }
    });

    resetState(exprInput.value);
  </script>
</body>
</html>
